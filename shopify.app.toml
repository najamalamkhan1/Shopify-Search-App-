# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c764fc1a2819d17de0fb9f9c368412af"
name = "search app by tbp"
application_url = "https://search-app-hcwsn.ondigitalocean.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "collections/update" ]
  uri = "/webhooks/collections/update"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "collections/delete" ]
  uri = "/webhooks/collections/delete"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "collections/create" ]
  uri = "/webhooks/collections/create"

[access_scopes]
scopes = "read_content,read_products,write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [
  "https://search-app-hcwsn.ondigitalocean.app/auth/callback",
  "https://search-app-hcwsn.ondigitalocean.app/auth/shopify/callback",
  "https://search-app-hcwsn.ondigitalocean.app/api/auth/callback"
]

[app_proxy]
url = "https://search-app-hcwsn.ondigitalocean.app/api"
subpath = "search-app"
prefix = "apps"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"